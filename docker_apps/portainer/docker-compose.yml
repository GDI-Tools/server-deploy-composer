services:
  portainer:
    image: portainer/portainer-ce:2.33.6
    container_name: portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT:-9445}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - portainer-network

volumes:
  portainer-data:
    driver: local

networks:
  portainer-network:
    driver: bridge
